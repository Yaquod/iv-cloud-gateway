syntax = "proto3";


package vehicle_gateway;

service VehicleGateway {


  rpc SendEta(EtaRequest) returns (EtaResponse);
  rpc SendStatus(StatusRequest) returns (StatusResponse);
  rpc SendArrive(ArriveRequest)returns (ArriveResponse);
  rpc UpdateVehicleLocation(UpdateVehicleLocationRequest) returns (UpdateVehicleLocationResponse);

}



message EtaRequest
{
  string vin_number = 1;
  int64 request_id = 2;
  double time = 3;
  double fare = 4;
}

message EtaResponse
{
  bool success = 1;
  string message = 2;
}




message StatusRequest
{
  string vin_number = 1;
  int64 trip_id = 2;
  string status = 3;
}

message StatusResponse {
  bool success = 1;
  string message = 2;
}

message ArriveRequest{
  string vin_number = 1;
  int64 trip_id = 2;
  double long = 3;
  double lat = 4;
}

message ArriveResponse{
  bool success = 1;
  string message = 2;
}




message UpdateVehicleLocationRequest
{
 string vinNumber = 1;
 double longitude = 2;
 double latitude = 3;
}

message UpdateVehicleLocationResponse
{
bool success = 1;
 string message = 2;
}