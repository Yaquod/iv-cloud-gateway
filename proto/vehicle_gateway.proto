syntax = "proto3";


package vehicle_gateway;

service VehicleGateway {


  rpc SendEta(EtaRequest) returns (EtaResponse);
  rpc SendStatus(StatusRequest) returns (StatusResponse);
  rpc SendArrive(ArriveRequest)returns (ArriveResponse);
  rpc UpdateVehicleLocation(UpdateVehicleLocationRequest) returns (UpdateVehicleLocationResponse);
  rpc TripInit(TripInitRequest) returns (TripInitResponse);
  rpc TripMove(TripMoveRequest) returns (TripMoveResponse);

  rpc VehicleCommandStream (stream VehicleEvent)
      returns (stream GatewayCommand);
}



message EtaRequest
{
  string vin_number = 1;
  int64 request_id = 2;
  double time = 3;
  double fare = 4;
}

message EtaResponse
{
  bool success = 1;
  string message = 2;
}




message StatusRequest
{
  string vin_number = 1;
  int64 trip_id = 2;
  string status = 3;
}

message StatusResponse {
  bool success = 1;
  string message = 2;
}

message ArriveRequest{
  string vin_number = 1;
  int64 trip_id = 2;
  double long = 3;
  double lat = 4;
}

message ArriveResponse{
  bool success = 1;
  string message = 2;
}




message UpdateVehicleLocationRequest
{
  string vinNumber = 1;
  double longitude = 2;
  double latitude = 3;
}

message UpdateVehicleLocationResponse
{
  bool success = 1;
  string message = 2;
}


message TripInitRequest {
  string vin_number = 1;
  int64 request_id = 2;
  double start_long = 3;
  double start_lat = 4;
  double end_long = 5;
  double end_lat = 6;
}

message TripInitResponse {
  bool success = 1;
  string message = 2;
}

message TripMoveRequest {
  string vin_number = 1;
  int64 trip_id = 2;
  double longitude = 3;
  double latitude = 4;
}

message TripMoveResponse {
  bool success = 1;
  string message = 2;
}

message GatewayCommand {
  oneof command {
    TripInitRequest trip_init = 1;
    TripMoveRequest trip_move = 2;
  }
}

message VehicleEvent {
  oneof event {
    TripInitResponse  trip_init_ack  = 1;
    TripMoveResponse  trip_move_ack  = 2;
    EtaRequest        eta            = 3;
    StatusRequest     status         = 4;
    ArriveRequest     arrive         = 5;
    UpdateVehicleLocationRequest   location       = 6;
  }
}