name: iv-gateway

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy
      - name: Run Clang-Format
        run: |
          find src tests -name '*.cpp' -o -name '*.h' | \
          xargs clang-format --dry-run --Werror

  build-ubuntu-24:
    name: Build Ubuntu 24.04 (${{ matrix.compiler.name }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: gcc-12, cc: gcc-12, cxx: g++-12 }
          - { name: gcc-13, cc: gcc-13, cxx: g++-13 }
        build_type: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev zlib1g-dev \
            libboost-system-dev libboost-thread-dev \
            libgrpc++-dev libprotobuf-dev \
            protobuf-compiler-grpc protobuf-compiler \
            ${{ matrix.compiler.cc }} ${{ matrix.compiler.cxx }}

      - name: Configure
        env:
          CC: ${{ matrix.compiler.cc }}
          CXX: ${{ matrix.compiler.cxx }}
        run: |
          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd build && ctest --output-on-failure

      - name: Upload Artifacts
        if: matrix.compiler.name == 'gcc-13' && matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: vehicle-gateway-ubuntu-24.04
          path: build/vehicle_gateway
          retention-days: 7

  build-ubuntu-24-clang:
    name: Build Ubuntu 24.04 (Clang)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev zlib1g-dev \
            libboost-system-dev libboost-thread-dev \
            libgrpc++-dev libprotobuf-dev \
            protobuf-compiler-grpc protobuf-compiler \
            clang-15 clang++-15

      - name: Configure
        env:
          CC: clang-15
          CXX: clang++-15
        run: |
          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd build && ctest --output-on-failure

  sanitizers:
    name: Sanitizers (${{ matrix.sanitizer }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev zlib1g-dev \
            libboost-system-dev libboost-thread-dev \
            libgrpc++-dev libprotobuf-dev \
            protobuf-compiler-grpc protobuf-compiler

      - name: Configure
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}" \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        continue-on-error: true
        run: cd build && ctest --output-on-failure --timeout 120

  sanitizer-thread:
    name: Sanitizers (thread)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev zlib1g-dev \
            libboost-system-dev libboost-thread-dev \
            libgrpc++-dev libprotobuf-dev \
            protobuf-compiler-grpc protobuf-compiler

      - name: Create TSan Suppressions
        run: |
          cat > tsan.supp << 'EOF'
          race:std::basic_ios
          race:std::basic_ostream
          race:std::ios_base
          race:libstdc++.so
          EOF

      - name: Configure
        env:
          CC: gcc
          CXX: g++
          TSAN_OPTIONS: suppressions=tsan.supp
        run: |
          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        uses: nick-fields/retry@v2
        env:
          TSAN_OPTIONS: suppressions=${{ github.workspace }}/tsan.supp
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd build && ctest --output-on-failure

  coverage:
    name: Code Coverage
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev zlib1g-dev \
            libboost-system-dev libboost-thread-dev \
            libgrpc++-dev libprotobuf-dev \
            protobuf-compiler-grpc protobuf-compiler \
            lcov gcovr

      - name: Configure
        run: |
          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -g -O0" \
            -DCMAKE_C_FLAGS="--coverage -g -O0" \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd build && ctest --output-on-failure

      - name: Generate Coverage (lcov)
        continue-on-error: true
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --rc geninfo_unexecuted_blocks=1 \
            --ignore-errors mismatch,gcov,negative \
            --exclude '/usr/*' \
            --exclude '*/third_party/*' \
            --exclude '*/tests/*' \
            --exclude '*/build/*' || true
          
          if [ -f coverage.info ]; then
            lcov --remove coverage.info '/usr/*' '*/third_party/*' '*/tests/*' '*/build/*' -o coverage.info
            lcov --list coverage.info || true
          fi

      - name: Generate Coverage (gcovr - alternative)
        run: |
          gcovr --xml-pretty --exclude-unreachable-branches \
            --exclude '/usr/*' \
            --exclude '.*/third_party/.*' \
            --exclude '.*/tests/.*' \
            --exclude '.*/build/.*' \
            --root . \
            --output coverage.xml \
            build/ || echo "gcovr failed, continuing..."

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.info,./coverage.xml
          fail_ci_if_error: false
          verbose: true